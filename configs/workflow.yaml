project_name: "bank_esg_report_extraction"
description: "银行ESG报告六个核心议题抽取项目"

paths:
  # 输入路径
  metadata: "data/metadata/metadata.csv"
  pdf_dir: "data/pdf"
  
  # 输出路径
  parsed_dir: "data/parsed"
  markdown_dir: "data/parsed/markdown"
  parsed_docs: "data/parsed/parsed_docs.jsonl"
  
  section_rules: "configs/section_rules.yaml"
  sections_jsonl: "data/parsed/sections.jsonl"
  section_report: "outputs/reports/section_check_report.csv"
  
  extract_results: "outputs/results/extract_results.jsonl"
  validated_csv: "outputs/results/records_validated.csv"
  validation_errors: "outputs/results/validation_errors.jsonl"
  
  run_log: "outputs/logs/run_log.jsonl"
  summary_report: "outputs/reports/summary_report.md"

steps:
  audit:
    enabled: true
    check_duplicates: true
    check_correlation: true
  
  parse:
    enabled: true
    limit: 100
    retry_count: 2
    use_mineru: true
  
  route_sections:
    enabled: true
    rules: "configs/section_rules.yaml"
  
  extract:
    enabled: true
    prompt: "prompts/prompt_final.md"
    model: "gpt-4o-mini"
  
  validate:
    enabled: true
    strict_mode: false
  
  aggregate:
    enabled: true
  
  report:
    enabled: true

logging:
  level: "INFO"
  format: "json"

settings:
  parallel: false
  batch_size: 10

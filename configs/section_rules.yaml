# 置信度阈值
confidence:
  high: 70   # 目录精确匹配
  medium: 50  # 关键词匹配
  low: 30    # 模糊匹配

# 页码容差 (允许的误差范围)
page_tolerance: 3

# 匹配策略
strategy:
  enable_fuzzy_match: true
  enable_synonym_match: true
  min_keyword_matches: 1